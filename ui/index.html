<!DOCTYPE html>
<html>
<body>
  <h2>Investment Tracker</h2>
  <button onclick="check()">Check API</button>
  <pre id="out"></pre>

  <script>
    async function check() {
      const res = await fetch('/health');
      document.getElementById('out').innerText =
        JSON.stringify(await res.json(), null, 2);
    }
  </script>
</body>
</html>
